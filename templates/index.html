<!DOCTYPE html>
<html>
<head>
    <img src="{{ url_for('static', filename='logo.png') }}" width="80">

<title>IRBC EMPLOYEE ATTENDANCE</title>

<style>

body{
    font-family: Arial;
    background: rgba(224, 70, 9, 0.13);
    margin:0;
}

.container{
    width:80%;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:30px;
    border-radius:8px;
}

h1{
    text-align:center;
    color:green;
}

.form-row{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input, select, textarea{
    padding:10px;
    font-size:14px;
    border:1px solid #ccc;
    border-radius:5px;
}

input{
    width:200px;
}

textarea{
    width:250px;
}

button{
    background:green;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:darkgreen;
}

.links{
    margin-bottom:20px;
}

.links a{
    margin-right:15px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:green;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border:1px solid #ddd;
    text-align:center;
}

tr:nth-child(even){
    background:#f2f2f2;
}

.delete{
    color:red;
    font-weight:bold;
}
.report-buttons{
margin-top:10px;
margin-bottom:20px;
}

.report-btn{
background:#ff7a00;
color:rgb(255, 255, 255);
border:none;
padding:10px 20px;
margin-right:10px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.report-btn:hover{
background:#dd6c10;
}
.report-buttons{
    display: flex;
    justify-content: center;
    gap: 15px;
}

</style>

</head>

<body>

<div class="container">
  <div style="text-align:center;margin-bottom:20px;">
<img src="{{ url_for('static', filename='logo.png') }}" width="120">
</div>

<h1>IRBC EMPLOYEE ATTENDANCE</h1>

<form method="POST">

<div class="form-row">

<input type="text" name="name" placeholder="Employee Name" required>

<select name="status">
<option>Present</option>
<option>Absent</option>
</select>

<textarea name="reason" placeholder="Reason if absent"></textarea>

<button type="submit">Save Attendance</button>

</div>

</form>

<div class="report-buttons">

<a href="/daily-report">
<button class="report-btn">Daily Report</button>
</a>

<a href="/monthly-report">
<button class="report-btn">Monthly Report</button>
</a>

</div>


<table>

<tr>
<th>Name</th>
<th>Status</th>
<th>Reason</th>
<th>Date</th>
<th>Action</th>
</tr>

{% for r in records %}

<tr>

<td>{{r.name}}</td>
<td>{{r.status}}</td>
<td>{{r.reason}}</td>
<td>{{r.date}}</td>

<td>
<a href="/delete/1" onclick="return confirm('Are you sure you want to delete this record?')">Delete</a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
