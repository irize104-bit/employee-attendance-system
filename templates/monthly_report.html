<!DOCTYPE html>
<html>

<head>

<title>Monthly Attendance Report</title>

<style>

body{
font-family: Arial;
background:#b4b3af;
margin:0;
}

.container{
width:70%;
margin:auto;
margin-top:60px;
background:white;
padding:40px;
border-radius:10px;
text-align:center;
}

h1{
color:green;
margin-bottom:30px;
}

.buttons{
margin-bottom:25px;
}

button{
background:#ff7a00;
color:white;
border:none;
padding:10px 20px;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#e06600;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:green;
color:white;
padding:12px;
}

td{
padding:10px;
border:1px solid #ddd;
}

tr:nth-child(even){
background:#f2f2f2;
}

</style>

</head>


<body>

<div class="container">

<div style="text-align:center;margin-bottom:20px;">
<img src="{{ url_for('static', filename='logo.png') }}" width="120">
</div>

<h1>Monthly Attendance Report</h1>

<div class="buttons">

<a href="/">
<button>Back</button>
</a>

<a href="/download-monthly-excel">
<button>Download Monthly Excel</button>
</a>

</div>


<table>

<tr>
<th>Name</th>
<th>Status</th>
<th>Reason</th>
<th>Date</th>
</tr>

{% for r in records %}

<tr>

<td>{{ r.name }}</td>
<td>{{ r.status }}</td>
<td>{{ r.reason }}</td>
<td>{{ r.date }}</td>

</tr>

{% endfor %}

</table>
<h2>Monthly Summary</h2>

<table>
<tr>
<th>Employee</th>
<th>Present</th>
<th>Absent</th>
</tr>

{% for name,data in summary.items() %}
<tr>
<td>{{ name }}</td>
<td>{{ data.present }}</td>
<td>{{ data.absent }}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
